<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ls-check-wip</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leichte Sprache Checker</title>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Atkinson Hyperlegible', sans-serif; }
  </style>
</head>

<body class="bg-gray-50 min-h-screen">
<div class="container mx-auto px-4 py-8 max-w-5xl" x-data="checker()">
  <!-- Header -->
  <div class="mb-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-2">Leichte Sprache Checker</h1>
    <p class="text-gray-600">Überprüfen Sie Ihren Text auf Verständlichkeit</p>
  </div>

  <!-- Input Area -->
  <div class="bg-white rounded-lg shadow-md p-6 mb-6">
    <label for="textInput" class="block text-sm font-medium text-gray-700 mb-2">
      Text eingeben
    </label>
    <textarea
      id="textInput"
      x-model="inputText"
      rows="8"
      class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-y"
      placeholder="Geben Sie hier Ihren Text ein..."
    ></textarea>

    <!-- Demo Text Buttons -->
    <div class="mt-3 mb-4 flex flex-wrap gap-4 text-sm">
      <span>Beispiele verwenden:</span>
      <button
        @click="loadDemoText('b2')"
        class="text-blue-600 hover:text-blue-800 underline"
      >
        B2 Originaltext
      </button>
      <button
        @click="loadDemoText('b1')"
        class="text-blue-600 hover:text-blue-800 underline"
      >
        B1 Text
      </button>
      <button
        @click="loadDemoText('a2')"
        class="text-blue-600 hover:text-blue-800 underline"
      >
        A2 Text
      </button>
      <button
        @click="loadDemoText('a1')"
        class="text-blue-600 hover:text-blue-800 underline"
      >
        A1 Text
      </button>
    </div>

    <button
      @click="checkText()"
      :disabled="loading || !inputText.trim()"
      class="mt-4 px-6 py-3 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors"
    >
      <span x-show="!loading">Text prüfen</span>
      <span x-show="loading" class="flex items-center">
          <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
               viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor"
                  d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Wird geprüft...
        </span>
    </button>
  </div>

  <!-- Error Message -->
  <div x-show="error" class="bg-red-50 border border-red-200 rounded-lg p-4 mb-6">
    <div class="flex">
      <svg class="h-5 w-5 text-red-400 mr-2" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd"
              d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
              clip-rule="evenodd"></path>
      </svg>
      <p class="text-sm text-red-700" x-text="error"></p>
    </div>
  </div>

  <!-- Results -->
  <div x-show="results" class="space-y-6">

    <!-- Statistics Overview -->
    <template x-if="results && results.statistics">
      <div class="bg-white rounded-lg shadow-md p-6">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">📊 Statistik</h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
          <div class="bg-red-50 rounded-lg p-4 text-center">
            <p class="text-sm text-gray-600 mb-1">Verstöße gesamt</p>
            <p class="text-3xl font-bold text-red-600" x-text="results.statistics.total_violations"></p>
          </div>
          <div class="bg-orange-50 rounded-lg p-4 text-center">
            <p class="text-sm text-gray-600 mb-1">Eindeutige Verstöße</p>
            <p class="text-3xl font-bold text-orange-600" x-text="results.statistics.unique_violations"></p>
          </div>
          <div class="bg-blue-50 rounded-lg p-4 text-center">
            <p class="text-sm text-gray-600 mb-1">Betroffene Wörter</p>
            <p class="text-3xl font-bold text-blue-600" x-text="getAffectedWordsCount()"></p>
          </div>
          <div class="bg-green-50 rounded-lg p-4 text-center">
            <p class="text-sm text-gray-600 mb-1">Regel-Kategorien</p>
            <p class="text-3xl font-bold text-green-600"
               x-text="Object.keys(results.statistics.violations_by_rule || {}).length"></p>
          </div>
        </div>

        <!-- Violations by Rule -->
        <template x-if="results.statistics.violations_by_rule">
          <div>
            <h3 class="text-sm font-semibold text-gray-700 mb-3">Verstöße nach Regel</h3>
            <div class="space-y-2">
              <template x-for="(count, rule) in results.statistics.violations_by_rule" :key="rule">
                <div class="flex items-center justify-between bg-gray-50 rounded px-4 py-2">
                  <span class="text-sm text-gray-700" x-text="formatRuleName(rule)"></span>
                  <span class="bg-red-100 text-red-700 text-xs font-medium px-2.5 py-0.5 rounded" x-text="count"></span>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
    </template>

    <!-- Issues List -->
    <template x-if="results && results.issues && results.issues.length > 0">
      <div class="bg-white rounded-lg shadow-md p-6">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">
          🔍 Gefundene Probleme
          <span class="text-base font-normal text-gray-500">(<span x-text="results.issues.length"></span>)</span>
        </h2>

        <div class="space-y-4">
          <template x-for="(issue, index) in results.issues" :key="index">
            <div class="border-l-4 border-red-400 bg-red-50 p-4 rounded-r-lg hover:bg-red-100 transition-colors">
              <div class="flex items-start">
                <div class="flex-shrink-0">
                  <span class="text-2xl" x-text="getIssueIcon(issue.rule_id)"></span>
                </div>
                <div class="ml-4 flex-1">
                  <div class="flex items-center justify-between mb-2">
                    <h3 class="text-sm font-semibold text-gray-900"
                        x-text="formatRuleName(issue.rule_id.replace('_issue', ''))"></h3>
                    <span class="bg-red-200 text-red-800 text-xs font-medium px-2 py-0.5 rounded" x-text="'\"' + issue.text + '\"'"></span>
                  </div>
                  <p class="text-sm text-gray-700" x-text="issue.message"></p>
                </div>
              </div>
            </div>
          </template>
        </div>
      </div>
    </template>

    <!-- Annotated Text -->
    <template x-if="results && results.annotated_text">
      <div class="bg-white rounded-lg shadow-md p-6">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">📝 Annotierter Text</h2>
        <div class="bg-gray-50 rounded-lg p-4 text-sm leading-relaxed">
          <p class="text-gray-700 whitespace-pre-wrap" x-text="results.annotated_text"></p>
        </div>
        <p class="text-xs text-gray-500 mt-3">
          ℹ️ Dieser Text zeigt, welche Wörter und Stellen markiert wurden. Detaillierte Erklärungen finden Sie in den
          Problemen oben.
        </p>
      </div>
    </template>

    <!-- Success Message if no issues -->
    <template x-if="results && (!results.issues || results.issues.length === 0)">
      <div class="bg-green-50 border border-green-200 rounded-lg p-6 text-center">
        <div class="text-5xl mb-3">✅</div>
        <h3 class="text-lg font-semibold text-green-800 mb-2">Großartig!</h3>
        <p class="text-green-700">Ihr Text enthält keine Verstöße gegen die Regeln der Leichten Sprache.</p>
      </div>
    </template>

  </div>
</div>

<script>
  function checker() {
    return {
      inputText: '',
      loading: false,
      error: '',
      results: null,

      async checkText() {
        this.loading = true;
        this.error = '';
        this.results = null;

        try {
          const response = await fetch('https://check.leichte-sprache.ai/analyse', {
            method: 'POST',
            headers: {
              'Accept': 'application/json',
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              text: this.inputText,
            }),
          });

          if (!response.ok) {
            throw new Error(`API-Fehler: ${response.status} ${response.statusText}`);
          }

          this.results = await response.json();
        } catch (err) {
          this.error = err.message || 'Ein Fehler ist aufgetreten. Bitte versuchen Sie es erneut.';
        } finally {
          this.loading = false;
        }
      },

      formatRuleName(ruleId) {
        return ruleId
          .replace(/regel_/g, '')
          .replace(/_/g, ' ')
          .replace(/\b\w/g, l => l.toUpperCase());
      },

      getIssueIcon(ruleId) {
        if (ruleId.includes('fremdwoerter')) {
          return '🌍';
        }
        if (ruleId.includes('schwierige_woerter')) {
          return '📖';
        }
        if (ruleId.includes('komplexe_woerter')) {
          return '🧩';
        }
        if (ruleId.includes('kurze_woerter')) {
          return '📏';
        }
        if (ruleId.includes('perplexity')) {
          return '🤔';
        }
        return '⚠️';
      },

      getAffectedWordsCount() {
        if (!this.results || !this.results.issues) {
          return 0;
        }
        const uniqueWords = new Set(this.results.issues.map(i => i.text));
        return uniqueWords.size;
      },

      loadDemoText(type) {
        const demoTexts = {
          b2: 'Die 4m breite Feuerwehrzufahrt sowie der Reversierplatz für das Feuerwehrfahrzeug sind in jedem Fall freizuhalten. Es darf auch kurzfristig keine Ware in diesem Bereich gelagert werden.',

          b1: `Feuerwehr-Zufahrt:
Die 4 Meter breite Feuerwehr-Zufahrt
muss immer frei gehalten werden.

Auch der Reversierplatz,
den das Feuerwehrfahrzeug
zum Umdrehen benötigt,
muss immer freigehalten werden.

Es darf dort niemals etwas abgestellt
oder gelagert werden – auch nicht für kurze Zeit.`,

          a2: `Die Feuerwehr-Zufahrt:
Bei allen Märkten gibt es
eine 4 Meter breite Feuerwehr-Zufahrt.

Außerdem gibt es einen Platz,
auf dem das Feuerwehr-Fahrzeug
leicht umdrehen kann.
Dieser Platz heißt „Reversierplatz".

Dieser Platz und die Feuerwehr-Zufahrt
müssen immer freigehalten werden!

Es darf dort niemals etwas abgestellt
oder gelagert werden.
Auch nicht für kurze Zeit.`,

          a1: `Dieser Platz ist für die Feuerwehr.
Hier darf nie etwas stehen.`,
        };

        this.inputText = demoTexts[type] || '';
        this.results = null;
        this.error = '';
      },
    };
  }
</script>
<script src='https://cdn.tailwindcss.com'></script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.15.0/cdn.js'></script>
</body>

</html>
